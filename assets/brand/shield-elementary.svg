<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" aria-label="MapleBear Canadian Elementary School">
  <!-- Brasão Canadian Elementary School (referência: brand kit pag 3, 11, 43) -->
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A50211"/>
      <stop offset="50%" stop-color="#C8131A"/>
      <stop offset="100%" stop-color="#8B0211"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF4D14"/>
      <stop offset="100%" stop-color="#C8131A"/>
    </linearGradient>
  </defs>
  <!-- Shield shape -->
  <path d="M20 18 L20 130 Q20 180 100 220 Q180 180 180 130 L180 18 Z" fill="url(#shieldGrad)" stroke="#7A0010" stroke-width="2"/>
  <!-- White "MapleBear" wordmark band at top -->
  <text x="100" y="48" text-anchor="middle" font-family="Sora, Arial Black, sans-serif" font-weight="800" font-size="22" fill="#FFFFFF" letter-spacing="-0.3">MapleBear</text>
  <!-- Stylized maple leaf inside (orange/red) -->
  <g transform="translate(100, 130)">
    <path d="M0 -55 L4 -33 L20 -38 L13 -22 L33 -25 L20 -10 L40 -3 L20 6 L42 24 L18 18 L25 36 L4 25 L0 50 L0 56 L-4 50 L-4 25 L-25 36 L-18 18 L-42 24 L-20 6 L-40 -3 L-20 -10 L-33 -25 L-13 -22 L-20 -38 L-4 -33 Z" fill="url(#leafGrad)"/>
  </g>
  <!-- Black bear silhouette walking (side view) -->
  <g transform="translate(60, 125)" fill="#000000">
    <!-- Body -->
    <ellipse cx="40" cy="20" rx="32" ry="14"/>
    <!-- Head -->
    <circle cx="72" cy="14" r="11"/>
    <!-- Ear -->
    <circle cx="78" cy="6" r="4"/>
    <!-- Snout -->
    <ellipse cx="82" cy="17" rx="5" ry="3"/>
    <!-- Front leg -->
    <rect x="62" y="28" width="6" height="14" rx="2"/>
    <!-- Back leg -->
    <rect x="18" y="28" width="6" height="14" rx="2"/>
    <!-- Other front leg slightly behind -->
    <rect x="50" y="29" width="5" height="12" rx="2"/>
    <!-- Other back leg slightly behind -->
    <rect x="28" y="29" width="5" height="12" rx="2"/>
  </g>
  <!-- Ground line -->
  <line x1="40" y1="170" x2="160" y2="170" stroke="#7A0010" stroke-width="2"/>
  <!-- Bottom text "CANADIAN ELEMENTARY SCHOOL" -->
  <text x="100" y="232" text-anchor="middle" font-family="Sora, Arial, sans-serif" font-weight="500" font-size="11" fill="#111" letter-spacing="1.2">CANADIAN ELEMENTARY SCHOOL</text>
</svg>
